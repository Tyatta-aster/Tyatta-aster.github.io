<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sound Horizon 진단</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0c10;
    --ink:#f4efe9;
    --muted:#ad9fa2;
    --gold:#cfa869;
    --gold-soft:#e9caa0;
    --wine:#8a2f45;
    --wine-deep:#3f1420;
    --violet:#7c5cff;
    --sky:#5fd0e8;
    --card-border: rgba(233,202,160,0.14);
    --card-bg: rgba(255,255,255,0.035);
    --shadow: 0 24px 60px rgba(0,0,0,.5);
    --radius:20px;
    --font-display:'Fraunces','Noto Serif KR', serif;
    --font-kr:'Noto Serif KR', serif;
    --font-ui:'Pretendard','Noto Sans KR', system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0}
  body{
    font-family:var(--font-ui);
    color:var(--ink);
    background-color:var(--bg);
    background-image:
      radial-gradient(ellipse 90% 45% at 15% -8%, rgba(150,60,90,0.18), transparent 62%),
      radial-gradient(ellipse 80% 45% at 105% 105%, rgba(95,120,220,0.14), transparent 62%);
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
    position:relative;
    min-height:100%;
    overflow-x:hidden;
  }
  /* 워터마크 문장(紋章) - 타일링 없이 상단에 크게 한 번, 아주 은은하게 */
  body::before{
    content:"";
    position:fixed; top:-6%; left:50%; transform:translateX(-50%);
    width:520px; height:520px; max-width:140vw;
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20200%20200'%3E%3Cg%20fill='none'%20stroke='%23e9caa0'%20stroke-width='0.6'%3E%3Ccircle%20cx='100'%20cy='100'%20r='70'/%3E%3Ccircle%20cx='100'%20cy='100'%20r='46'/%3E%3Ccircle%20cx='100'%20cy='100'%20r='20'/%3E%3Cpath%20d='M100%2054%20C112%2070%20112%20130%20100%20146%20C88%20130%2088%2070%20100%2054%20Z'/%3E%3Cpath%20d='M54%20100%20C70%2088%20130%2088%20146%20100%20C130%20112%2070%20112%2054%20100%20Z'/%3E%3Cpath%20d='M67%2067%20C80%2075%20120%20125%20133%20133'/%3E%3Cpath%20d='M133%2067%20C120%2075%2080%20125%2067%20133'/%3E%3C/g%3E%3C/svg%3E");
    background-repeat:no-repeat;
    background-size:contain;
    opacity:0.05;
    pointer-events:none;
    z-index:0;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 20px 48px;position:relative;z-index:1}

  /* ---------- 지평선 진행바 ---------- */
  #horizonBar{ padding:22px 2px 4px; }
  .horizon-svg{ width:100%; height:26px; display:block; }
  .horizon-label{
    font-family:var(--font-ui);
    font-size:10.5px;
    font-weight:600;
    letter-spacing:.16em;
    color:var(--muted);
    text-transform:uppercase;
    text-align:right;
    margin-top:4px;
  }

  .eyebrow{
    font-family:var(--font-ui);
    font-weight:600;
    font-size:11.5px;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--gold-soft);
    margin-bottom:10px;
  }
  h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:34px;
    letter-spacing:-.01em;
    margin:0 0 6px;
    color:var(--ink);
  }
  h2{
    font-family:var(--font-ui);
    font-weight:400;
    font-size:16px;
    line-height:1.65;
    margin:2px 0 18px;
    color:var(--muted);
  }
  .divider{
    width:40px; height:2px; border-radius:2px;
    background:linear-gradient(90deg, var(--violet), var(--gold));
    margin:18px 0 22px;
  }

  .screen{display:none}
  .screen.active{display:block; animation:fadeUp .45s ease both}
  @keyframes fadeUp{ from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:translateY(0)} }
  @media (prefers-reduced-motion: reduce){ .screen.active{animation:none} }

  .card{
    background:var(--card-bg);
    border:1px solid var(--card-border);
    padding:26px 24px;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  input[type="text"]{
    width:100%;
    padding:14px 16px;
    border-radius:12px;
    border:1px solid rgba(233,202,160,0.2);
    background:rgba(0,0,0,0.25);
    color:var(--ink);
    font-size:16px;
    font-family:var(--font-ui);
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input[type="text"]::placeholder{ color:rgba(173,159,162,0.6) }
  input[type="text"]:focus{
    outline:none;
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(207,168,105,0.16);
  }

  /* ---------- 버튼 공통 ---------- */
  button{ font-family:inherit; touch-action:manipulation; }
  .btn{
    display:inline-block;
    padding:14px 22px;
    border-radius:999px;
    border:1px solid rgba(233,202,160,0.35);
    background:linear-gradient(135deg, var(--wine), var(--wine-deep));
    color:var(--gold-soft);
    font-family:var(--font-ui);
    font-weight:600;
    font-size:15px;
    letter-spacing:.01em;
    cursor:pointer;
    box-shadow:0 10px 26px rgba(0,0,0,.35);
    transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
  }
  @media (hover:hover) and (pointer:fine){
    .btn:hover{ transform:translateY(-1px); filter:brightness(1.12); }
  }
  .btn:active{ transform:translateY(0) scale(.98); }
  .btn:focus-visible{ outline:3px solid var(--gold-soft); outline-offset:3px; }

  .btn.secondary{
    background:rgba(255,255,255,0.03);
    color:var(--muted);
    border:1px solid rgba(233,202,160,0.22);
    box-shadow:none;
    font-weight:500;
  }
  @media (hover:hover) and (pointer:fine){
    .btn.secondary:hover{ border-color:var(--gold); color:var(--gold-soft); }
  }

  .btn-gradient{
    display:block; width:100%; text-align:center;
    background:linear-gradient(90deg, var(--violet), var(--sky));
    border:1px solid rgba(255,255,255,0.25);
    color:#12101c;
    padding:16px 20px;
    font-size:16px;
    font-weight:700;
    box-shadow:0 10px 26px rgba(0,0,0,.35);
  }
  @media (hover:hover) and (pointer:fine){
    .btn-gradient:hover{ filter:brightness(1.08); box-shadow:0 14px 34px rgba(124,92,255,.35); }
  }

  .options{display:flex;flex-direction:column;gap:10px;margin-top:18px}
  .option-btn{
    padding:15px 18px;
    border-radius:14px;
    border:1px solid rgba(233,202,160,0.12);
    background:rgba(255,255,255,0.025);
    color:var(--ink);
    text-align:left;
    font-family:var(--font-ui);
    font-weight:400;
    font-size:15px;
    line-height:1.55;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease, transform .1s ease;
  }
  @media (hover:hover) and (pointer:fine){
    .option-btn:hover{ border-color:rgba(233,202,160,0.4); background:rgba(233,202,160,0.06); }
  }
  .option-btn:active{ transform:scale(.99); background:rgba(233,202,160,0.08); }
  .option-btn:focus-visible{ outline:3px solid var(--gold-soft); outline-offset:2px; }

  .muted{color:var(--muted);font-size:12.5px;margin-top:16px; line-height:1.6;}

  .back-btn{
    display:block;
    margin:16px auto 0;
    padding:10px 16px;
    background:transparent;
    border:none;
    color:var(--muted);
    font-family:var(--font-ui);
    font-size:13px;
    cursor:pointer;
    text-align:center;
  }
  @media (hover:hover) and (pointer:fine){
    .back-btn:hover{ color:var(--gold-soft); }
  }
  .back-btn:focus-visible{ outline:3px solid var(--gold-soft); outline-offset:2px; }

  /* ---------- 공유 패널 ---------- */
  .share-overlay{
    position:fixed; inset:0; z-index:50;
    background:rgba(0,0,0,0.55);
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .share-panel{
    width:100%; max-width:380px;
    background:#171018;
    border:1px solid var(--card-border);
    border-radius:16px;
    padding:22px 20px;
    box-shadow:var(--shadow);
    display:flex; flex-direction:column; gap:10px;
  }
  .share-panel-title{
    font-family:var(--font-kr); font-weight:700; font-size:16px; color:var(--gold-soft);
  }
  .share-panel-input{
    width:100%; padding:12px 14px; border-radius:10px;
    border:1px solid rgba(233,202,160,0.25);
    background:rgba(0,0,0,0.3); color:var(--ink);
    font-size:13px; font-family:var(--font-ui);
  }
  .share-panel-status{
    font-size:12.5px; color:var(--muted); line-height:1.5; min-height:18px;
  }
  .share-panel .btn{ width:100%; text-align:center; margin-top:2px; }

  /* ---------- 로딩 ---------- */
  .loading-wrap{
    min-height:280px;
    display:flex;align-items:center;justify-content:center;
    padding:18px;
    position:relative;
    overflow:visible;
  }
  .loading-wrap::before{
    content:"";
    position:absolute; inset:-10%;
    background:radial-gradient(ellipse 60% 50% at 50% 35%, rgba(207,168,105,0.14), transparent 65%);
    pointer-events:none;
    z-index:0;
  }
  .vertical-line{
    position:absolute;left:50%;top:0;transform:translateX(-50%);
    width:2px;height:0;
    background:linear-gradient(180deg, rgba(233,202,160,0.9), rgba(233,202,160,0.15));
    z-index:1;border-radius:1px;
  }
  .vertical-area{
    position:relative;z-index:2;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    margin:0 auto;padding-top:38px;min-height:170px;
  }
  .vchar{
    display:block;
    font-family:var(--font-kr);
    font-size:20px;line-height:1;
    color:var(--ink);
    letter-spacing:0.05em;
  }
  .reveal-mask{
    position:absolute;left:0;right:0;top:-30vh;height:calc(100% + 60vh);
    background:var(--bg);
    z-index:3;pointer-events:none;
    transform:translateY(0%);
  }
  .loading-hint-wrap{ display:flex; justify-content:center; margin-top:16px; }
  .spark-center{
    font-size:28px;
    color:var(--gold-soft);
    display:inline-block;
    opacity:0;
    text-shadow:0 0 16px rgba(233,202,160,.5);
  }
  @keyframes blinkSpark {
    0%{opacity:0; transform:scale(0.8) rotate(-10deg)}
    10%{opacity:1; transform:scale(1.08) rotate(0deg)}
    40%{opacity:0.6; transform:scale(0.95) rotate(6deg)}
    70%{opacity:0.2; transform:scale(0.9) rotate(-4deg)}
    100%{opacity:0; transform:scale(0.8) rotate(-10deg)}
  }
  .spark-center.blink{animation: blinkSpark 1.3s linear infinite}

  /* ---------- 결과 ---------- */
  .result-card{
    padding:30px 24px;
    border-radius:var(--radius);
    color:var(--ink);
    min-height:340px;
    display:flex;flex-direction:column;align-items:center;gap:10px;
    text-align:center;
  }
  .result-lede{
    font-family:var(--font-ui);
    font-size:13.5px;
    color:var(--muted);
    margin:0;
  }
  .album-title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:25px;
    line-height:1.35;
    color:var(--gold-soft);
    margin:6px 0 16px;
  }
  .album-img{
    width:76%;max-width:280px;
    border-radius:14px;display:block;margin:0 auto 18px;
    box-shadow:0 20px 48px rgba(0,0,0,.55);
    background:linear-gradient(160deg, rgba(233,202,160,0.12), rgba(0,0,0,0.35));
    aspect-ratio:1/1;
    object-fit:cover;
    border:1px solid rgba(233,202,160,0.3);
  }
  .result-reason{
    font-family:var(--font-ui);
    font-style:italic;
    font-size:13px;
    color:var(--gold-soft);
    margin:0 0 8px;
  }
  .desc{color:var(--ink);text-align:center;max-width:92%;line-height:1.8;font-size:14.5px; opacity:.9; margin:0 0 4px;}
  .controls{display:flex; flex-wrap:wrap; gap:10px; margin-top:22px; width:100%;}
  .controls > a{ flex:1 1 100%; text-decoration:none; }
  .controls > a .btn{ width:100%; text-align:center; }
  .controls > button.secondary{ flex:1 1 calc(50% - 5px); }

  @media(min-width:720px){
    .vchar{font-size:24px}
    .card{padding:34px 32px}
    h1{font-size:40px}
  }
</style>
</head>
<body>
  <div class="wrap">
    <div id="horizonBar"></div>

    <!-- 시작 -->
    <div id="start" class="screen active">
      <div class="eyebrow">Sound Horizon 입문 진단</div>
      <h1>Sound Horizon</h1>
      <h2>당신에게 어울리는 앨범은?</h2>
      <div class="divider"></div>
      <div class="card">
        <input id="nickname" type="text" placeholder="닉네임 입력 (선택)" />
        <div style="margin-top:16px">
          <button id="startBtn" class="btn btn-gradient">지평선을 여행한다</button>
        </div>
        <p class="muted">*본 테스트는 개인 제작이며 공식과 무관합니다.</p>
      </div>
    </div>

    <!-- 질문 -->
    <div id="questions" class="screen">
      <div id="questionCard" class="card"></div>
    </div>

    <!-- 로딩 -->
    <div id="loading" class="screen">
      <div class="card loading-wrap" role="status" aria-live="polite" aria-label="로딩 중">
        <div class="vertical-line" id="vline"></div>
        <div class="vertical-area" id="verticalArea"></div>
        <div class="reveal-mask" id="revealMask"></div>
      </div>
      <div class="loading-hint-wrap">
        <span class="spark-center blink" id="spark">✧</span>
      </div>
    </div>

    <!-- 결과 -->
    <div id="result" class="screen">
      <div id="resultCard" class="card result-card"></div>
    </div>
  </div>

<script>
/* ===== 설정 ===== */
const REVEAL_DURATION_MS = 10000; // 애니메이션 길이
const POST_REVEAL_DELAY_MS = 1000; // 애니메이션 끝난 뒤 결과 표시까지 1초 지연
const POLL_TIMEOUT_MS = 600;

const questions = [
  {"id":"Q1","text":"블루레이 플레이어(재생 가능한 기기)를 갖고 있나요?","options":[
    {"text":"예","effect":{}},
    {"text":"아니오","effect":{"exclude":["Em_P","Em_F"]}}
  ]},
  {"id":"Q2","text":"처음 입문이니, 어떤 분량의 이야기를 원하나요?","options":[
    {"text":"짧고 굵게, 입문하기 쉬운 이야기","group":"short","effect":{}},
    {"text":"분량 상관없이 장대한 대서사시","group":"epic","effect":{}}
  ]},
  {"id":"Q3","text":"끌리는 이야기의 무대는?","options":[
    {"text":"신과 인간을 둘러싼 이야기","effect":{"Mo":2,"Syo":1,"Ib":1}},
    {"text":"격동하는 역사의 현장","effect":{"Ib":2,"Hal_N":2,"Id":1}},
    {"text":"당신이 지금 살고 있는 현재","effect":{"Hal_A":2,"Em_P":2,"Em_F":2,"Vani":2,"Ne":1}},
    {"text":"역사가 기억하지 않는 인간의 이야기","effect":{"Ro":2,"Hal_A":2,"Ne":1,"Hal_N":1}},
    {"text":"아름답지만 잔혹한 다크 판타지","effect":{"Ma":2,"El_P":2,"El_4":2,"Id":2}}
  ]},
  {"id":"Q4","text":"주인공에게 가장 어울리는 키워드는?","options":[
    {"text":"깊은 원한을 품고 복수를 바라는 자","effect":{"Ma":2,"Hal_A":2,"Mo":1,"Id":2}},
    {"text":"간절한 소원을 이루고 싶어하는 자","effect":{"Em_P":2,"Em_F":2,"El_4":1}},
    {"text":"'이게 나야!' 묵묵히 살아가는 자","effect":{"Vani":2,"Ne":2,"Ro":2,"Hal_N":1,"Hal_A":1}},
    {"text":"운명에 휘둘리며 비틀거리는 자","effect":{"Syo":2,"Mo":2,"Ib":2,"El_P":1}}
  ]},
  {"id":"Q5","text":"선호하는 음악 스타일은?","options":[
    {"text":"경쾌하고 심플한 밴드 뮤직","effect":{"Ro":1,"El_P":1,"El_4":1,"Vani":2}},
    {"text":"장엄한 오케스트라와 밴드의 조화","effect":{"Mo":2,"Ma":2,"Hal_N":1,"Id":2}},
    {"text":"'이야기 음악'의 특색을 강하게 살린 앨범","effect":{"Hal_A":2,"Hal_N":2,"Ne":2,"Em_P":2,"Em_F":2}}
  ]},
  {"id":"Q6","text":"선호하는 이야기 전개 방식은?","options":[
    {"text":"하나의 흐름으로 쭉 이어지는 이야기","effect":{"Mo":2,"Ib":2,"Hal_A":2,"Ma":2,"Id":2}},
    {"text":"각자의 인생을 담은 이야기","effect":{"Ro":2,"Vani":1,"Syo":1,"El_P":1}},
    {"text":"서로 다른 인물의 인생이 얽혀 큰 줄기를 이루는 이야기","effect":{"Ma":2,"Ne":2,"Hal_N":2,"El_4":2,"Em_P":2,"Em_F":2,"Id":1}}
  ]},
  {"id":"Q7","text":"끌리는 이미지는?","options":[
    {"text":"새하얀 대지를 가로지르는 붉은 궤적","effect":{"El_4":2,"El_P":1}},
    {"text":"혼란한 세계 속에서 희망을 위해 검을 든 자","effect":{"Syo":2}},
    {"text":"끝이 보이지 않는 지평선, 이야기를 찾는 여행자들","effect":{"Ro":2}},
    {"text":"격렬한 전장의 불꽃","effect":{"Ib":2}},
    {"text":"고대 신전 유적에 잠든 서사시","effect":{"Mo":2}},
    {"text":"말라비틀어진 장미 덩굴에 감긴 오래된 우물","effect":{"Ma":2,"Id":2}},
    {"text":"별이 흩어지는 푸른 밤하늘","effect":{"Vani":2,"Ne":1}},
    {"text":"계절이 뒤섞인 신비로운 신사","effect":{"Em_P":2,"Em_F":2}},
    {"text":"할로윈의 떠들썩한 밤을 넘어, 아침으로 향하는 고요한 새벽","effect":{"Hal_A":2,"Hal_N":2}}
  ]}
];

/* Q2("분량") 하드 필터 그룹 — 14개 앨범이 정확히 두 그룹으로 전부 나뉩니다 (누락 없음).
   Id(이드에 이르는 숲에 이르는 이드)는 말씀하신 "Q2-1"에 따라 short 그룹에 포함했어요. */
const Q2_GROUPS = {
  short: ["Ib","Hal_N","Hal_A","Syo","Em_P","Vani","El_P","Id"],
  epic:  ["Mo","Ma","Em_F","El_4","Ro","Ne"]
};

// Q3~Q7 모든 옵션은 trait 없이 앨범 코드에 직접 점수를 매깁니다.

const albums = {
  "El_P": { title:"Elysion~낙원으로의 전주곡~", color:"#4a3f72", playlist_url:"#", reason:"짧고 강렬한 이야기", description:"낙원의 전주곡." },
  "El_4": { title:"Elysion", color:"#5a4f82", playlist_url:"#", reason:"환상적인 이야기", description:"낙원 환상 모음." },
  "Syo": { title:"소년は剣を…", color:"#3a3a3a", playlist_url:"#", reason:"운명적 이야기", description:"드라마틱한 서사." },
  "Ro": { title:"Roman", color:"#2c2c54", playlist_url:"#", reason:"인간의 삶과 운명을 서사적으로 탐구", description:"대표작 중 하나." },

/* ===== 상태 ===== */
let currentQ = 0;
let answers = [];
let excludedAlbums = []; // Q1 게이트 등에서 제외된 앨범 코드 목록 (하드 제외)
let includedAlbums = null; // Q2에서 선택한 그룹 (하드 포함, null이면 아직 제한 없음)

/* 현재 시점에 유효한 후보 앨범 목록 (Q1 제외 + Q2 그룹 필터를 모두 반영) */
function currentPool(){
  const all = Object.keys(albums);
  const base = includedAlbums ? includedAlbums : all;
  return base.filter(a => !excludedAlbums.includes(a));
}
const startBtn = document.getElementById('startBtn');

/* ===== 지평선 진행바 ===== */
const HB_GOLD = '#e9caa0';
const HB_GOLD_DIM = 'rgba(233,202,160,0.25)';
const HB_TRACK = 'rgba(233,202,160,0.18)';

function dotX(index, total){
  return total === 1 ? 200 : 16 + (index/(total-1))*368;
}

function renderHorizonBar(screenId){
  if(screenId === 'start'){
    document.getElementById('horizonBar').innerHTML = '';
    return;
  }
  const total = questions.length;
  let filled;
  if(screenId === 'questions') filled = currentQ;
  else filled = total; // loading, result

  const markerIndex = Math.max(0, Math.min(filled, total - 1));
  let dots = "";
  for(let i=0;i<total;i++){
    const x = dotX(i, total);
    const passed = i < filled;
    dots += `<circle cx="${x}" cy="13" r="${passed?3.2:2.4}" fill="${passed?HB_GOLD:HB_TRACK}" />`;
  }
  const markerX = dotX(markerIndex, total);
  const displayNum = Math.min(filled + 1, total);
  const label = `Q${displayNum} / ${total}`;

  document.getElementById('horizonBar').innerHTML = `
    <svg class="horizon-svg" viewBox="0 0 400 26" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <linearGradient id="hbGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#7c5cff"/>
          <stop offset="100%" stop-color="${HB_GOLD}"/>
        </linearGradient>
      </defs>
      <line x1="16" y1="13" x2="384" y2="13" stroke="${HB_TRACK}" stroke-width="1.5"/>
      <line x1="16" y1="13" x2="${markerX}" y2="13" stroke="url(#hbGrad)" stroke-width="2"/>
      ${dots}
      <circle cx="${markerX}" cy="13" r="4.5" fill="${HB_GOLD}" stroke="#0e0c10" stroke-width="1.5"/>
    </svg>
    <div class="horizon-label"><span>${label}</span></div>`;
}

/* ===== 화면 전환 ===== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  renderHorizonBar(id);
}

/* ===== 앨범 점수 계산 헬퍼 =====
   answers 배열(각 항목 {effect, weight?})을 받아 앨범 점수를 계산합니다.
   effect의 각 key는 앨범 코드(예: "Mo", "El_P")이고 value는 그 옵션이 주는 점수입니다.
   weight는 기본 1이며, Q7 응답에는 큰 가중치를 줘서 "최종 선택"에 가깝게 만듭니다. */
function scoreFromAnswers(list){
  const albumScores = {};
  Object.keys(albums).forEach(k => albumScores[k] = 0);

  list.forEach(a=>{
    const eff = a.effect || {};
    const w = a.weight || 1;
    Object.keys(eff).forEach(k=>{
      if(k === 'exclude') return;
      if(!(k in albumScores)) return; // 알 수 없는 코드는 무시(오타 방지)
      const val = Number(eff[k]);
      if(!isNaN(val)) albumScores[k] += val * w;
    });
  });

  return albumScores;
}

/* 이 선택지가 실제로 채점하는 앨범 코드 목록 */
function optionTargets(effect){
  return Object.keys(effect || {}).filter(k => k !== 'exclude' && k in albums);
}

/* Q1~Q6 누적 기준 상위 n개 앨범(동점 포함) — 현재 후보 풀(currentPool) 내에서만 */
function getTopCandidates(n){
  const scores = scoreFromAnswers(answers);
  const pool = currentPool();
  pool.sort((a,b) => (scores[b]||0) - (scores[a]||0));
  if(pool.length <= n) return pool;
  const cutoff = scores[pool[n-1]] || 0;
  return pool.filter(k => (scores[k]||0) >= cutoff);
}

/* ===== 질문 렌더링 ===== */
function renderQuestion(){
  const q = questions[currentQ];
  const container = document.getElementById('questionCard');
  container.innerHTML = '';
  const title = document.createElement('h2'); title.textContent = q.text; container.appendChild(title);

  let visibleOptions;
  if(q.id === 'Q7'){
    // 마지막 질문: Q1~Q6 누적 상위 3개 앨범과 관련된 선택지만 노출
    const top3 = getTopCandidates(3);
    visibleOptions = q.options.filter(opt => {
      const targets = optionTargets(opt.effect || {});
      return targets.length === 0 || targets.some(a => top3.includes(a));
    });
    if(visibleOptions.length === 0) visibleOptions = q.options; // 안전장치
  } else {
    visibleOptions = q.options.filter(opt => {
      const eff = opt.effect || {};
      const targets = optionTargets(eff);
      const pool = currentPool();
      return targets.length === 0 || targets.some(a => pool.includes(a));
    });
    if(visibleOptions.length === 0) visibleOptions = q.options; // 안전장치
  }

  const opts = document.createElement('div'); opts.className = 'options';
  visibleOptions.forEach(opt=>{
    const b = document.createElement('button');
    b.className = 'option-btn';
    b.type = 'button';
    b.innerText = opt.text;
    b.onclick = (e)=> { e.currentTarget.blur(); selectOption(opt); };
    opts.appendChild(b);
  });

  container.appendChild(opts);

  const backBtn = document.createElement('button');
  backBtn.className = 'back-btn';
  backBtn.type = 'button';
  backBtn.textContent = '← 이전 질문으로';
  backBtn.onclick = (e)=> { e.currentTarget.blur(); goBack(); };
  container.appendChild(backBtn);
  showScreen('questions');
}

/* ===== 선택 처리 ===== */
const Q7_WEIGHT = 30; // Q7 선택지가 결과를 사실상 확정하도록 주는 가중치

/* Q1(제외)·Q2(그룹) 하드 필터 상태를 answers 배열로부터 처음부터 다시 계산합니다.
   되돌리기(뒤로가기) 시 이 함수를 다시 부르면 항상 정확한 상태로 복원됩니다. */
function recomputeGateState(){
  excludedAlbums = [];
  includedAlbums = null;
  answers.forEach(a => {
    const eff = a.effect || {};
    if(Array.isArray(eff.exclude)){
      eff.exclude.forEach(code => { if(!excludedAlbums.includes(code)) excludedAlbums.push(code); });
    }
    if(a.group && Q2_GROUPS[a.group]){
      includedAlbums = Q2_GROUPS[a.group].slice();
    }
  });
}

function selectOption(opt){
  const eff = opt.effect || {};
  const isQ7 = questions[currentQ].id === 'Q7';
  answers.push({ text: opt.text, effect: eff, weight: isQ7 ? Q7_WEIGHT : 1, group: opt.group || null });
  recomputeGateState();

  currentQ++;

  if(currentQ < questions.length){
    renderQuestion();
    return;
  }

  const albumKey = calculateResult();
  showScreen('loading');
  const phrase = '날실은 자아지고···';
  showKaraokeVerticalWipe(phrase, { duration: REVEAL_DURATION_MS, delay: 120, linePadding: 8 })
    .then(()=> setTimeout(()=> renderResult(albumKey), POST_REVEAL_DELAY_MS));
}

/* ===== 공유 패널 (alert/prompt 미사용 — 샌드박스 환경에서도 동작) ===== */
function showSharePanel(url){
  const old = document.getElementById('sharePanelOverlay');
  if(old) old.remove();

  const overlay = document.createElement('div');
  overlay.id = 'sharePanelOverlay';
  overlay.className = 'share-overlay';

  const panel = document.createElement('div');
  panel.className = 'share-panel';

  const title = document.createElement('div');
  title.className = 'share-panel-title';
  title.textContent = '결과 공유 링크';
  panel.appendChild(title);

  const input = document.createElement('input');
  input.type = 'text';
  input.readOnly = true;
  input.value = url;
  input.className = 'share-panel-input';
  panel.appendChild(input);

  const status = document.createElement('div');
  status.className = 'share-panel-status';
  status.textContent = '아래 링크를 길게 눌러(또는 클릭 후 Ctrl/Cmd+C) 복사하세요.';
  panel.appendChild(status);

  const copyBtn = document.createElement('button');
  copyBtn.type = 'button';
  copyBtn.className = 'btn secondary';
  copyBtn.textContent = '복사하기';
  copyBtn.onclick = () => {
    input.focus();
    input.select();
    input.setSelectionRange(0, url.length);
    let copied = false;
    try { copied = document.execCommand('copy'); } catch(err){ copied = false; }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(
        () => { status.textContent = '복사됐어요!'; },
        () => { status.textContent = copied ? '복사됐어요!' : '자동 복사가 막혀있어요 — 링크를 직접 선택해 복사해주세요.'; }
      );
    } else {
      status.textContent = copied ? '복사됐어요!' : '자동 복사가 막혀있어요 — 링크를 직접 선택해 복사해주세요.';
    }
  };
  panel.appendChild(copyBtn);

  const closeBtn = document.createElement('button');
  closeBtn.type = 'button';
  closeBtn.className = 'btn secondary';
  closeBtn.textContent = '닫기';
  closeBtn.onclick = () => overlay.remove();
  panel.appendChild(closeBtn);

  overlay.appendChild(panel);
  overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);

  input.focus();
  input.select();
}

/* ===== 뒤로가기 ===== */
function goBack(){
  if(currentQ === 0){
    showScreen('start');
    return;
  }
  answers.pop();
  currentQ -= 1;
  recomputeGateState();
  renderQuestion();
}

/* ===== 결과 계산 (Q1~Q7 누적 점수 기준, Q7은 가중치로 사실상 확정) =====
   currentPool()로 Q1(제외) + Q2(그룹 하드 필터) 밖의 앨범은 아예 후보에서 뺀다.
   (다른 trait가 그룹 밖 앨범에 우연히 점수를 얹어도 최종 후보에는 절대 안 들어감) */
function calculateResult(){
  const albumScores = scoreFromAnswers(answers);
  const candidateKeys = currentPool();

  let maxScore = -Infinity;
  candidateKeys.forEach(k => { const v = albumScores[k] || 0; if(v > maxScore) maxScore = v; });
  const winners = candidateKeys.filter(k => (albumScores[k] || 0) === maxScore);

  if(winners.length > 1) return winners[Math.floor(Math.random()*winners.length)];
  return winners[0] || currentPool()[0] || Object.keys(albums)[0];
}

/* ===== 결과 렌더링 ===== */
function renderResult(albumKey){
  document.getElementById('verticalArea').innerHTML = '';
  const mask = document.getElementById('revealMask');
  mask.style.transition = 'none';
  mask.style.transform = 'translateY(100%)';
  document.getElementById('vline').style.height = '0px';

  const nick = (document.getElementById('nickname').value || '여행자');
  const album = albums[albumKey] || albums['Ro'];
  const container = document.getElementById('resultCard');
  container.innerHTML = '';

  container.style.background = `linear-gradient(180deg, ${album.color}26, ${album.color}12)`;
  container.style.borderColor = `${album.color}88`;

  const lede = document.createElement('p'); lede.className='result-lede'; lede.textContent = `${nick} 님에게 추천하는 앨범은...`; container.appendChild(lede);
  const title = document.createElement('div'); title.className='album-title'; title.textContent = album.title; container.appendChild(title);

  tryLoadAlbumImage(container, albumKey, album.title);

  if(album.reason){ const reason = document.createElement('p'); reason.textContent = album.reason; reason.className='result-reason'; container.appendChild(reason); }
  const desc = document.createElement('p'); desc.textContent = `${album.description}`; desc.className='desc'; container.appendChild(desc);

  const controls = document.createElement('div'); controls.className='controls';

  const playLink = document.createElement('a'); playLink.href = album.playlist_url || '#'; playLink.target='_blank'; playLink.rel='noopener';
  const playBtn = document.createElement('button'); playBtn.className='btn btn-gradient'; playBtn.type='button'; playBtn.textContent='앨범 들어보기'; playLink.appendChild(playBtn); controls.appendChild(playLink);

  const shareBtn = document.createElement('button'); shareBtn.className='btn secondary'; shareBtn.type='button'; shareBtn.textContent='공유하기';
  shareBtn.onclick = (e)=> {
    e.currentTarget.blur();
    const shareUrl = location.href.split('#')[0] + `#result=${albumKey}`;
    showSharePanel(shareUrl);
  };
  controls.appendChild(shareBtn);

  const retryBtn = document.createElement('button'); retryBtn.className='btn secondary'; retryBtn.type='button'; retryBtn.textContent='다시하기';
  retryBtn.onclick = (e)=> { e.currentTarget.blur(); currentQ=0; answers=[]; excludedAlbums=[]; includedAlbums=null; showScreen('start'); };
  controls.appendChild(retryBtn);

  container.appendChild(controls);
  showScreen('result');
}

/* ===== 폴링 기반 reveal (완료 감지) ===== */
function showKaraokeVerticalWipe(text, options = {}) {
  const duration = options.duration ?? REVEAL_DURATION_MS;
  const delay = options.delay ?? 0;
  const easing = options.easing ?? 'cubic-bezier(.22,.9,.28,1)';
  const linePadding = options.linePadding ?? 8;

  const area = document.getElementById('verticalArea');
  const mask = document.getElementById('revealMask');
  const vline = document.getElementById('vline');

  area.innerHTML = '';
  mask.style.transition = 'none';
  mask.style.transform = 'translateY(0%)';

  const chars = Array.from(text);
  chars.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'vchar';
    el.textContent = (ch === ' ') ? '\u00A0' : ch;
    area.appendChild(el);
  });

  return new Promise(resolve => {
    requestAnimationFrame(() => {
      const firstChar = area.querySelector('.vchar');
      const card = area.parentElement;
      if(firstChar){
        const cardRect = card.getBoundingClientRect();
        const firstRect = firstChar.getBoundingClientRect();
        const height = Math.max(24, firstRect.top - cardRect.top - linePadding);
        vline.style.height = `${height}px`;
      } else {
        vline.style.height = `48px`;
      }

      void mask.offsetHeight;

      setTimeout(() => {
        mask.style.transition = `transform ${duration}ms ${easing}`;
        mask.style.transform = 'translateY(100%)';

        const startTime = performance.now();
        let rafId = null;

        const checkFinished = () => {
          const maskRect = mask.getBoundingClientRect();
          const parentRect = mask.parentElement.getBoundingClientRect();
          if(maskRect.top >= parentRect.bottom - 2){
            resolve();
            return;
          }
          if(performance.now() - startTime > duration + POLL_TIMEOUT_MS){
            resolve();
            return;
          }
          rafId = requestAnimationFrame(checkFinished);
        };

        rafId = requestAnimationFrame(checkFinished);
      }, delay);
    });
  });
}

/* ===== 시작 버튼 ===== */
startBtn.addEventListener('click', (e)=>{
  e.currentTarget.blur();
  currentQ = 0;
  answers = [];
  excludedAlbums = [];
  includedAlbums = null;
  renderQuestion();
});

/* ===== 앨범 자켓 이미지 자동 로딩 =====
   images/ 폴더에 "앨범코드.확장자" 이름으로 파일만 넣으면 자동으로 불러옵니다.
   예: Mo(모이라) → images/Mo.jpg  /  El_P(엘리시온 전주곡) → images/El_P.jpg
   여러 확장자를 순서대로 시도하고, 다 실패하면 안내 문구를 보여줍니다. */
const IMAGE_FOLDER = 'images';
const IMAGE_EXTENSIONS = ['jpg', 'jpeg', 'png', 'webp'];

function tryLoadAlbumImage(container, code, title){
  const imgel = document.createElement('img');
  imgel.alt = title;
  imgel.className = 'album-img';
  imgel.loading = 'eager';
  let extIndex = 0;

  const tryNext = () => {
    if(extIndex >= IMAGE_EXTENSIONS.length){
      const fallback = document.createElement('div');
      fallback.className = 'album-img';
      fallback.style.display = 'flex';
      fallback.style.alignItems = 'center';
      fallback.style.justifyContent = 'center';
      fallback.style.color = 'var(--muted)';
      fallback.style.fontSize = '13px';
      fallback.style.textAlign = 'center';
      fallback.style.padding = '16px';
      fallback.style.lineHeight = '1.6';
      fallback.textContent = `${IMAGE_FOLDER}/${code}.jpg 파일을 넣어주세요`;
      imgel.replaceWith(fallback);
      return;
    }
    imgel.src = `${IMAGE_FOLDER}/${code}.${IMAGE_EXTENSIONS[extIndex]}`;
    extIndex++;
  };

  imgel.onerror = tryNext;
  container.appendChild(imgel);
  tryNext();
}

/* ===== 공유 링크로 접속한 경우, 저장된 답변 없이도 바로 그 결과를 보여줌 =====
   공유 버튼이 만드는 URL 형태: ...#result=Mo */
function tryLoadSharedResult(){
  const m = location.hash.match(/^#result=([A-Za-z0-9_]+)$/);
  if(m && albums[m[1]]){
    renderResult(m[1]);
    return true;
  }
  return false;
}

/* 초기 화면 (최초 로드 시) */
if(!tryLoadSharedResult()){
  renderHorizonBar('start');
  showScreen('start');
}

/* 이미 열려있는 탭에 해시만 다른 같은 페이지 주소를 붙여넣는 경우,
   브라우저가 새로고침 없이 주소만 바꾸는 경우가 있어 별도로 감지합니다. */
window.addEventListener('hashchange', () => {
  tryLoadSharedResult();
});
